[pytest]
pythonpath = .
testpaths = tests
addopts = -v --strict-markers
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    config: tests for config parsing
    input: tests for correct input

[mypy]
python_version = 3.13
namespace_packages = true
warn_return_any = true
warn_unused_ignores = false